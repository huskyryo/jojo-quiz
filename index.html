<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ジョジョの奇妙な冒険 キャラクタークイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-l:#F0D080;--dark:#0a0a0f;--dark2:#12121a;--dark3:#1a1a26;--dark4:#22223a;--text:#e8e4d8;--text2:#a09880;--border:rgba(201,168,76,0.2);--border2:rgba(201,168,76,0.45);--green:#4a9e6a;--green-bg:#0d2016;--red:#c04040;--red-bg:#200d0d;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse at 15% 15%,rgba(201,168,76,.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(80,60,160,.05) 0%,transparent 55%);}
#app{max-width:560px;margin:0 auto;padding:1.5rem 1rem 4rem;}
.logo{text-align:center;padding:2rem 0 1.75rem;border-bottom:1px solid var(--border);margin-bottom:1.75rem;}
.logo-sub{font-size:11px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.logo-title{font-size:24px;font-weight:700;color:var(--text);letter-spacing:.06em;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.stat{border-radius:12px;padding:14px 10px;text-align:center;}
.stat-num{font-size:26px;font-weight:700;}
.stat-lbl{font-size:13px;margin-top:3px;}
.pbar-wrap{background:var(--dark4);border-radius:4px;height:5px;margin-bottom:1.75rem;overflow:hidden;}
.pbar-fill{height:5px;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:4px;transition:width .6s;}
.btn{display:block;width:100%;padding:13px 18px;background:var(--dark3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;text-align:left;margin-bottom:8px;transition:all .15s;line-height:1.5;}
.btn:active{background:var(--dark4);border-color:var(--border2);}.btn.gold:active{background:rgba(201,168,76,.1);}@media(hover:hover){.btn:hover{background:var(--dark4);border-color:var(--border2);}.btn.gold:hover{background:rgba(201,168,76,.1);}.z-icon:hover{transform:scale(1.1);}.back-btn:hover{color:var(--text);}}
.btn.center{text-align:center;}
.btn.gold{border-color:var(--gold);color:var(--gold);}

.btn.muted{color:var(--text2);font-size:13px;}
.btn.correct{background:var(--green-bg);border-color:var(--green);color:#7dd4a0;}
.btn.wrong{background:var(--red-bg);border-color:var(--red);color:#e08080;}
.hint-wrap{background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
.hint-lbl{font-size:13px;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.hint-text{font-size:16px;line-height:1.8;color:var(--text);}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.unlock-wrap{border-radius:16px;padding:1.5rem;text-align:center;margin-bottom:1rem;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.part-badge{display:inline-block;font-size:12px;padding:3px 12px;border-radius:20px;}
.tab-row{display:flex;gap:6px;margin-bottom:1.25rem;}
.tab{flex:1;padding:9px 4px;border:1px solid var(--border);border-radius:10px;background:var(--dark3);color:var(--text2);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;text-align:center;line-height:1.4;transition:all .15s;}
.tab.act-star{border-color:#EF9F27;background:#1e1400;color:#d4a060;}
.tab.act-easy{border-color:#4a9e6a;background:#0d2016;color:#7dd4a0;}
.tab.act-normal{border-color:#4a7ec0;background:#0d1828;color:#7ab4f0;}
.tab.act-hard{border-color:#c04040;background:#200d0d;color:#e08080;}
.z-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;position:relative;transition:transform .15s;border:1px solid rgba(255,255,255,.08);}

.z-lock{background:var(--dark4)!important;color:var(--text2)!important;opacity:.3;cursor:default;border-color:transparent!important;}
.z-lock:hover{transform:none;}
.detail-wrap{border:1px solid var(--border2);border-radius:16px;padding:1.5rem;background:var(--dark2);}
.info-row{display:flex;align-items:center;gap:4px;padding:10px 0;border-bottom:1px solid var(--border);}
.info-key{font-size:11px;letter-spacing:.02em;color:var(--gold);width:62px;flex-shrink:0;white-space:nowrap;}
.info-val{font-size:13px;color:var(--text);line-height:1.5;flex:1;min-width:0;}
.info-lock{font-size:13px;color:var(--text2);font-style:italic;flex:1;}
.back-btn{background:none;border:none;color:var(--text2);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;padding:0;margin-bottom:1rem;display:inline-flex;align-items:center;gap:4px;}

</style>
</head>
<body>
<div id="app"></div>
<script>
const CHARS={"ジョナサン・ジョースター":{"d":"誠実で紳士的、揺るぎない正義感の持ち主。どんな相手にも真正面からぶつかる。","s":"なし（波紋使い）","q":"「貴様のような奴にジョースターの名を名乗る資格はない！」","p":"Part 1"},"ディオ・ブランドー":{"d":"カリスマと野望の塊。支配欲が強く、頂点以外は認めない。","s":"ザ・ワールド（時を止める）","q":"「無駄無駄無駄無駄ァァァ！！」","p":"Part 1 / 3"},"ウィル・A・ツェペリ":{"d":"豊富な経験と強い使命感を持つ師匠肌。笑いを交えながら深い知恵を伝える。","s":"なし（波紋使い）","q":"「人は皆、必ず死ぬ。だから今を生きろ」","p":"Part 1"},"ロバート・E・O・スピードワゴン":{"d":"義侠心あふれる人情家。仲間への愛情と熱い語りで場を盛り上げる。","s":"なし","q":"「スピードワゴンはクールに去るぜ」","p":"Part 1 / 2"},"エリナ・ペンドルトン":{"d":"穏やかで芯が強い。どんな状況でも他者を思いやる優しさを持つ。","s":"なし","q":"「ジョナサン…」","p":"Part 1"},"ブラフォード":{"d":"騎士道精神を体現した誇り高き戦士。敵にも礼節を示す高潔さと、魂の純粋さを持つ。","s":"なし（ゾンビ騎士）","q":"「ジョナサン・ジョースター…お前は本物の紳士だ」","p":"Part 1"},"タルカス":{"d":"力こそが全てと信じる圧倒的な破壊者。本能と怒りで動き、障害は全て力でねじ伏せる。","s":"なし（ゾンビ騎士）","q":"「ウオオオォォ！！」","p":"Part 1"},"ストレイツォ":{"d":"老いへの恐怖と嫉妬から道を踏み外した悲しき男。かつては仲間を慕う純粋な心を持っていた。","s":"なし（柱の男化）","q":"「老いたくなかっただけだ…永遠の命が欲しかった」","p":"Part 1 / 2"},"ジョセフ・ジョースター":{"d":"機転が利きノリが良い。ピンチほど本領を発揮する天才的アドリブ屋。","s":"ハーミットパープル（情報収集）","q":"「次に○○と言う！」","p":"Part 2 / 3 / 4"},"シーザー・アントニオ・ツェペリ":{"d":"プライドが高く情熱的。仲間思いで、家族への深い愛を胸に秘めている。","s":"なし（波紋使い）","q":"「おれが最期にみせるのは代々受け継いだ未来にたくすツェペリ魂だ！人間の魂だ！」","p":"Part 2"},"リサリサ":{"d":"厳格でクール、実力主義。感情を表に出さず、静かな威圧感を放つ。","s":"なし（波紋使い）","q":"「泣き言は強くなってから言いなさい」","p":"Part 2"},"カーズ":{"d":"完璧を追い求める冷徹な支配者。知性と力を兼ね備え、目的のためなら何でもする。","s":"なし（究極生命体）","q":"「私は完璧だ」","p":"Part 2"},"ワムウ":{"d":"誇り高い戦士。強者との真剣勝負を何より重んじ、己の信念に忠実。","s":"なし（柱の男）","q":"「戦士としての誇りにかけて」","p":"Part 2"},"エシディシ":{"d":"感情の起伏が激しく泣き上戸。しかし切り替えが早く、冷酷な判断ができる。","s":"なし（柱の男）","q":"「あァァァんまりだァァァァ」","p":"Part 2"},"シュトロハイム":{"d":"大げさな愛国心と自己陶酔が服を着て歩いている。しかし仲間への献身は本物の情熱家。","s":"なし（機械化改造人間）","q":"「ドイツの科学力は世界一ィィィ！」","p":"Part 2"},"サンタナ":{"d":"感情も恐怖も持たず、静かに確実に目標へ向かう。本能と知性が融合した純粋な存在。","s":"なし（柱の男）","q":"「…（無言で行動する）」","p":"Part 2"},"スモーキー・ブラウン":{"d":"素直で機転が利く少年。目上への敬意を忘れず、自分の信念は曲げない真っ直ぐな心を持つ。","s":"なし","q":"「ジョジョ！気をつけろよ！」","p":"Part 2"},"空条承太郎":{"d":"無口でクール。口数は少ないが、いざとなれば誰より頼りになる。","s":"スタープラチナ（精密・超高速）","q":"「やれやれだぜ」","p":"Part 3 / 4 / 6"},"花京院典明":{"d":"知的で冷静な戦略家。誇り高い戦士としての覚悟と、仲間への深い友情を胸に秘める。","s":"ハイエロファント・グリーン（エメラルドスプラッシュ）","q":"「承太郎ッ！君の意見を聞こうッ！」","p":"Part 3"},"ジャン=ピエール・ポルナレフ":{"d":"熱血でプライドが高い。感情的だが仲間への愛情は人一倍深い。","s":"シルバーチャリオッツ（剣の達人）","q":"「あ…ありのまま今起こった事を話すぜ！」","p":"Part 3 / 5"},"モハメド・アヴドゥル":{"d":"冷静で知的な参謀役。高い洞察力と的確な判断で仲間を支える。","s":"マジシャンズレッド（炎）","q":"「チッ♪チッ♪ YES I AM!」","p":"Part 3"},"イギー":{"d":"気まぐれで自由奔放、コーヒーガム命。でも最後は仲間のために動く。","s":"ザ・フール（砂）","q":"「やれやれ…犬好きの子供は見殺しには……できねーぜ！」","p":"Part 3"},"ホル・ホース":{"d":"要領よく立ち回る便乗上手。二番手を好み、自分の身を守ることを優先。","s":"エンペラー（拳銃）","q":"「一番よりNo.2！これがホル・ホースの人生哲学」","p":"Part 3"},"エンヤ婆":{"d":"特定の相手への執念深い忠誠心。目的のためには手段を選ばない。","s":"ジャスティス（霧）","q":"「DIOさまのためなら…」","p":"Part 3"},"ヴァニラ・アイス":{"d":"狂信的な忠誠心と冷酷さ。主のためなら自分を犠牲にすることも厭わない。","s":"クリーム（虚無）","q":"「DIO様のためなら死も厭わぬ！」","p":"Part 3"},"ン・ドゥール":{"d":"視覚を失った代わりに研ぎ澄まされた感覚を持つ。誇り高く、信念だけを頼りに戦う孤高の男。","s":"ゲブ神（水の刃）","q":"「DIO様への忠誠こそが我が全てだ」","p":"Part 3"},"マライア":{"d":"魅力と計算高さを武器にする。相手の隙を見逃さず、常に自分が優位に立とうとする。","s":"バステト女神（磁力）","q":"「DIO様の魅力には誰も抗えない…ふふ」","p":"Part 3"},"スティーリー・ダン":{"d":"臆病で卑劣、常に他人を盾にして安全圏に逃げ込む。ずる賢さだけは超一流。","s":"ラバーズ（体内に寄生する）","q":"「ジョースターの老いぼれ！もっと謝れ！」","p":"Part 3"},"ダニエル・J・ダービー":{"d":"人の心と欲望を読む才能に長けたカリスマ的賭博師。相手の弱さを見抜き、魂ごと奪う。","s":"オシリス（魂を賭ける）","q":"「お前の負けだ。魂ごともらう」","p":"Part 3"},"ペット・ショップ":{"d":"感情を持たず、縄張りに踏み込む者を無条件で排除する。本能だけで動く冷酷な番人。","s":"ホルス（氷）","q":"（鋭い眼光で無言のまま攻撃する）","p":"Part 3"},"デーボ":{"d":"復讐を胸に秘め、ひたすら機会を待つ忍耐の持ち主。恨みは決して忘れない。","s":"エボニーデビル（呪い人形）","q":"「俺は絶対に恨みを晴らす…必ずな」","p":"Part 3"},"ミドラー":{"d":"自分の実力に強い誇りを持つ戦士。格下と見なされることを何より嫌う闘争心の持ち主。","s":"ハイプリエステス（変形・吸収）","q":"「私の強さを見せてあげる！」","p":"Part 3"},"カメオ":{"d":"甘言と見せかけの親切で相手を罠にはめる策士。表の顔と裏の顔を巧みに使い分ける。","s":"ジャッジメント（土人形召喚）","q":"「さあ、願いを叶えてあげよう…くくく」","p":"Part 3"},"東方仗助":{"d":"熱血で面倒見が良い。仲間思いで感情豊か。髪型だけは触れるな。","s":"クレイジー・ダイヤモンド（修復）","q":"「てめーは俺を怒らせた」","p":"Part 4"},"吉良吉影":{"d":"平穏を愛し、目立つことを嫌う完璧主義者。静かな日常こそ全て。","s":"キラークイーン（爆弾化）","q":"「静かに暮らしたいだけなんだ」","p":"Part 4"},"岸辺露伴":{"d":"プライドが高く探究心旺盛。自分の道を一切曲げない孤高の芸術家。","s":"ヘブンズ・ドアー（本に変える）","q":"「だが断る」","p":"Part 4"},"虹村億泰":{"d":"単純明快で感情豊か。直感と勢いで動くが、友達のためなら体を張る。","s":"ザ・ハンド（消去）","q":"「仗助ォ！」","p":"Part 4"},"広瀬康一":{"d":"内向的で慎重だが観察力が高い。経験を積みながら着実に成長する。","s":"エコーズ（成長型）","q":"「僕にだってできることがある！」","p":"Part 4"},"山岸由花子":{"d":"一途で執着心が強い。好きな相手へは全力で、嫌いな相手にも全力。","s":"ラブデラックス（磁力）","q":"「愛は無敵ですもの」","p":"Part 4"},"音石明":{"d":"計算高く冷静。自分のペースを崩さず、常に一手先を読んで動く。","s":"レッド・ホット・チリ・ペッパー（電気）","q":"「おれはもう勝っている」","p":"Part 4"},"重ちー":{"d":"ちゃっかりしていて欲張り。自分の利益を優先しがちだが、憎めないキャラ。","s":"ハーヴェスト（収集）","q":"「お金が大事！」","p":"Part 4"},"杉本鈴美":{"d":"穏やかで献身的な魂。自らの悲劇を乗り越え、静かに他者を守り続ける優しさを持つ。","s":"エンジェル・オブ・デス（幽霊としての案内）","q":"「後ろを振り向かないで…お願い」","p":"Part 4"},"宮本照之":{"d":"繊細な感情を抱えながらも、追い詰められると予測不能な行動に出る不安定さを持つ。","s":"エニグマ（紙に変える）","q":"「お前は今…恐怖を感じているだろう」","p":"Part 4"},"片桐安十郎":{"d":"欲望のままに生きる凶悪な犯罪者。冷酷で残忍、社会への憎悪を隠さない危険な男。","s":"アクア・ネックレス（水に乗り移る）","q":"「俺は悪魔だ…人間の皮をかぶった悪魔だ」","p":"Part 4"},"鋼田一豪":{"d":"自分のルックスと能力に絶対的な自信を持つ自惚れ屋。しかし実力は本物。","s":"ハイウェイ・スター（栄養吸収・追跡）","q":"「俺様の顔に免じて許してやろう」","p":"Part 4"},"吉良吉廣":{"d":"息子の平穏のためなら何でもする陰謀の父。表に出ず、裏から糸を引く策士。","s":"アトム・ハート・ファザー（写真内に閉じ込める）","q":"「吉影の邪魔をする者は…排除する」","p":"Part 4"},"大柳賢":{"d":"常に怯えていて臆病。しかし知らずに危険を巻き散らかす、意図せぬ厄介者。","s":"チープ・トリック（背後に憑く）","q":"「こ、怖い怖い怖い！」","p":"Part 4"},"ジョルノ・ジョバァーナ":{"d":"静かな情熱と高い理想。夢のためなら一切の妥協を許さない。","s":"ゴールド・エクスペリエンス（生命を与える）","q":"「これは…『黄金の精神』だ」","p":"Part 5"},"ブローノ・ブチャラティ":{"d":"仲間思いで義侠心が強い。嘘を見抜く洞察力と、滲み出る誠実さ。","s":"スティッキー・フィンガーズ（ジッパー）","q":"「'任務は遂行する''部下も守る''両方'やらなくっちゃあならないってのが'幹部'のつらいところだな 覚悟はいいか？オレはできてる」","p":"Part 5"},"レオーネ・アバッキオ":{"d":"皮肉屋で無愛想。だが信念と仲間への忠誠心は誰にも負けない。","s":"ムーディー・ブルース（再現）","q":"「俺は過去に忠実なだけだ」","p":"Part 5"},"ナランチャ・ギルガ":{"d":"直感型で感情豊か。勉強は苦手でも、仲間のためなら全力で動く。","s":"エアロスミス（戦闘機型）","q":"「ナランチャ、16才！」","p":"Part 5"},"グイード・ミスタ":{"d":"おおらかで楽天的。細かいことは気にせず、仲間と食事を楽しむことが好き。","s":"セックス・ピストルズ（弾丸誘導）","q":"「4は嫌いだ」","p":"Part 5"},"パンナコッタ・フーゴ":{"d":"高い知性を持ちながら、怒りのスイッチが入ると手がつけられなくなる。","s":"パープル・ヘイズ（猛毒）","q":"「これは…理性的な判断だ」","p":"Part 5"},"トリッシュ・ウナ":{"d":"最初はわがままに見えるが、本当は芯が強く自立した女性。","s":"スパイス・ガール（軟化）","q":"「私は自分で戦う！」","p":"Part 5"},"ディアボロ":{"d":"孤独を好み、自分の秘密を守ることに執着。権力のためには何でもする。","s":"キング・クリムゾン（時を飛ばす）","q":"「このディアボロには誰も近づけない」","p":"Part 5"},"リゾット・ネエロ":{"d":"寡黙でリーダー気質。仲間への強い忠誠心と、静かな凄みを持つ。","s":"メタリカ（磁力・鉄）","q":"「チームの仲間を傷つけた者は許さない」","p":"Part 5"},"ギアッチョ":{"d":"細かいことにこだわりすぎる短気な完璧主義者。些細なことで激昂する。","s":"ホワイト・アルバム（氷）","q":"「なんで○○なんだよ！説明しろ！」","p":"Part 5"},"プロシュート":{"d":"厳しい兄貴分で仲間を鼓舞する。一度決めた仕事は命をかけて全うするプロ中のプロ。","s":"ザ・グレイトフル・デッド（老化）","q":"「始めた仕事は最後まで！それがプロってもんだ！」","p":"Part 5"},"ペッシ":{"d":"最初は弱気だが、心に火がつくと誰より激しく燃える。秘めた成長の可能性を持つ男。","s":"ビーチ・ボーイ（釣り針）","q":"「兄貴ィィィィ！！」","p":"Part 5"},"チョコラータ":{"d":"穏やかな笑顔の裏に冷酷な狂気を隠す。相手の苦しむ様を観察することに歪んだ喜びを感じる。","s":"グリーン・デイ（カビ）","q":"「ブラボー…ブラボーォォ」","p":"Part 5"},"ズッケェロ":{"d":"いつもぼやき、楽な方法を探す怠け者。不満を口にしながらも実行はする小悪党。","s":"ソフト・マシーン（空気を抜く）","q":"「ったく、なんで俺がこんな目に…」","p":"Part 5"},"サーレー":{"d":"感情を表に出さず淡々と任務をこなす冷静な刺客。無駄口を叩かず、確実に仕留める。","s":"クラフト・ワーク（動きを止める）","q":"「仕事は確実に終わらせる」","p":"Part 5"},"スクアーロ":{"d":"計算高く執念深い追跡者。ターゲットを追い詰めるまで決して諦めない持久力の持ち主。","s":"クラッシュ（水中を泳ぐ鮫型）","q":"「逃げても無駄だ。必ず仕留める」","p":"Part 5"},"ティッツァーノ":{"d":"寡黙で冷静、感情より任務を優先する職業人。パートナーとの連携に全てを賭ける。","s":"トーキング・ヘッド（嘘を本当に変える）","q":"「スクアーロ、任せろ」","p":"Part 5"},"セッコ":{"d":"子供のように無邪気で予測不能。感情のままに行動し、常識の外側で生きる危険な存在。","s":"オアシス（地面を泥状に変える）","q":"「あっちゃ〜！舐めたら甘いかな〜？」","p":"Part 5"},"空条徐倫":{"d":"強さと優しさを兼ね備えた芯の強い女性。どんな逆境でも諦めない。","s":"ストーン・フリー（糸を操る）","q":"「あたしは…この'石の海'から自由になる…『ストーン・フリー』よ…これが名前」","p":"Part 6"},"エルメェス・コステロ":{"d":"熱血で正義感が強い姉御肌。復讐心を胸に秘めながらも仲間思い。","s":"キッス（スタンプ複製）","q":"「あたしは姉の仇を取る！」","p":"Part 6"},"フー・ファイターズ":{"d":"無邪気で好奇心旺盛。生命の喜びをストレートに表現する純粋さがある。","s":"フー・ファイターズ（プランクトン）","q":"「これがあたしの'魂'……これがあたしの'知性'……あたしは生きていた」","p":"Part 6"},"アナスイ":{"d":"徐倫への一途な愛に全てをかける。執着心は強いが、芯はまっすぐ。","s":"ダイバー・ダウン（物体に潜る）","q":"「徐倫のためなら何でもする」","p":"Part 6"},"ウェザー・リポート":{"d":"寡黙で謎めいており、感情を表に出さない。しかし内に強い意志を持つ。","s":"ウェザー・リポート（天候操作）","q":"「おまえは自分が'悪'だと気づいていない…もっともドス黒い'悪'だ」","p":"Part 6"},"エンポリオ・アルニーニョ":{"d":"慎重で観察力が高い。冷静に状況を分析し、できることを着実にこなす。","s":"バーニン・ダウン・ザ・ハウス（幽霊部屋）","q":"「おまえは'運命'に負けたんだ！'正義の道'を歩む事こそ'運命'なんだ！！」","p":"Part 6"},"プッチ神父":{"d":"確固たる信念と使命感を持つ。目的のためには一切の迷いを見せない。","s":"メイド・イン・ヘブン（時を加速する）","q":"「落ちつくんだ…'素数'を数えて落ちつくんだ」","p":"Part 6"},"ドナテロ・ヴェルサス":{"d":"不公平な境遇への怒りを原動力にする。強い執念と、世界への恨みを心の奥に燃やす。","s":"アンダーワールド（記憶の再現）","q":"「なぜ俺だけが…こんな目に！」","p":"Part 6"},"スポーツ・マックス":{"d":"計算高く冷徹。感情を表に出さず、常に自分が有利な状況だけを選んで動く。","s":"ライム・ライト（死体操作）","q":"「俺は負けない場所でしか戦わない」","p":"Part 6"},"ミュウミュウ":{"d":"職務に忠実で規則に厳格。ルールを絶対視し、それを盾に相手を追い詰める官僚的な強さ。","s":"ジェイル・ハウス・ロック（記憶制限）","q":"「ここでは私がルールよ」","p":"Part 6"},"グウェス":{"d":"他者への嫉妬と自分だけ得したい欲望が強い。力を持つと途端に支配しようとする小悪。","s":"グー・グー・ドールズ（小さくする）","q":"「私の言う通りにしていれば生き残れる」","p":"Part 6"},"ケンゾー":{"d":"宿命と運命を絶対視する老人。流れに全てを委ね、抵抗することが無意味と信じる。","s":"ドラゴンズ・ドリーム（運命の吉凶を示す）","q":"「これが運命だ。抗っても無駄よ」","p":"Part 6"},"ランゲ・ランゲル":{"d":"極端な潔癖症で他者との接触を嫌う変わり者。自分だけのルールで生き、孤立を好む。","s":"ジャンピン・ジャック・フラッシュ（無重力化）","q":"「触るな！近づくな！汚れる！」","p":"Part 6"},"ジョニィ・ジョースター":{"d":"最初は自分本位だが、旅を通じて本物の意志を手に入れた男。","s":"タスク（回転する釘）","q":"「この'物語'はぼくが歩き出す物語だ」","p":"Part 7"},"ジャイロ・ツェペリ":{"d":"飄々としていて独特のセンスを持つ。深い経験と信念を笑いで包む。","s":"鉄球（黄金の回転）","q":"「俺は'納得'したいだけだ！'納得'は全てに優先するぜッ！」","p":"Part 7"},"ディエゴ・ブランドー":{"d":"野心家でクール。実力主義で、勝つことへの執念が誰より強い。","s":"スケアリー・モンスターズ（恐竜化）","q":"「勝つのは俺だ」","p":"Part 7"},"ファニー・バレンタイン":{"d":"強い愛国心と使命感を持つ。目的のためには手段を選ばない信念の人。","s":"D4C（平行世界移動）","q":"「我が心と行動に一点の曇りなし……！全てが'正義'だ」","p":"Part 7"},"マウンテン・ティム":{"d":"義侠心があり頼れる兄貴分。困っている人を放っておけない正義の人。","s":"オー！ロンサム・ミー（ロープ）","q":"「困ってる奴を見捨てるのは俺の流儀じゃない」","p":"Part 7"},"ホット・パンツ":{"d":"寡黙でストイック。感情を表に出さず、目的に向かって黙々と動く。","s":"クリーム・スターター（肉スプレー）","q":"「私は私の目的を果たす」","p":"Part 7"},"リンゴォ・ロードアゲイン":{"d":"西部の掟を信奉する孤高のガンマン。真の強者とのみ戦いを望む、高潔で不屈の戦士。","s":"マンダム（6秒巻き戻し）","q":"「ようこそ男の世界へ」","p":"Part 7"},"ルーシー・スティール":{"d":"小柄だが誰より勇敢。守るべき者がいる限り、どんな恐怖にも立ち向かう強い意志の持ち主。","s":"なし（一般人）","q":"「私にできることをするだけ」","p":"Part 7"},"サンドマン":{"d":"自分の民族の誇りと自由を何より大切にする。類まれな俊足と、揺るぎない信念で走り続ける。","s":"イン・ア・サイレント・ウェイ（音）","q":"「俺の走りは誰にも止められない」","p":"Part 7"},"ブラックモア":{"d":"ファニー・バレンタインへの揺るぎない忠誠心を持つ。信念のためなら命を惜しまない求道者。","s":"キャッチ・ザ・レインボー（雨の中に潜む）","q":"「大統領のためなら、命など惜しくはない」","p":"Part 7"},"マジェント・マジェント":{"d":"独自の論理と信念で動く謎多き男。他人には理解しがたい行動パターンを持つが、本人は至って真剣。","s":"20th センチュリー・ボーイ（平面化）","q":"「俺の作戦に間違いはない」","p":"Part 7"},"アクシル・ロ":{"d":"全ての人間は罪を抱えていると信じる審判者。他者の罪悪感を暴き、その重みで裁こうとする。","s":"シビル・ウォー（罪悪感の幻影）","q":"「お前は自分の罪から逃げられない」","p":"Part 7"},"東方定助":{"d":"穏やかで思いやりがある。記憶はなくても、懸命に今を生きようとする。","s":"ソフト＆ウェット（泡）","q":"「勝ったのは…オレです！たっぷり！」","p":"Part 8"},"東方常秀":{"d":"傲慢で短気。プライドが高く、自分の思い通りにならないとすぐ不満を表す。","s":"ナット・キング・コール（熱）","q":"「俺様をナメるな！」","p":"Part 8"},"広瀬康穂":{"d":"明るく素直で親切。誰にでも分け隔てなく接する自然な優しさを持つ。","s":"ペイズリー・パーク（ナビゲート）","q":"「大丈夫？何かできることある？」","p":"Part 8"},"虹村透龍":{"d":"好奇心旺盛で行動力がある。直感で動き、面白そうなことに飛びつく。","s":"ワンダー・オブ・U（厄災を引き寄せる）","q":"「厄災に正義は無い 悪との区別も無い」","p":"Part 8"},"東方大弥":{"d":"目的のためなら策略もいとわない。記憶を奪う能力を持つ策士。","s":"カリフォルニア・キング・ベッド（記憶操作）","q":"「あなたのことは忘れてもらうわ」","p":"Part 8"},"鳩":{"d":"おしゃれでマイペースに見えて、いざという時は予想を超える行動力と情熱を発揮する。","s":"ウォーキング・ハート（ハイヒールの攻撃）","q":"「家族を傷つけるなら…許さない！」","p":"Part 8"},"東方花都":{"d":"表向きは穏やかだが、内に潜む大胆さと計算高さは家族一。突拍子もない行動で場をひっくり返す。","s":"スペース・トラッキン（スタンドを封じ込める）","q":"「驚いた？ふふ…まだまだよ」","p":"Part 8"},"東方常敏":{"d":"競争と勝利への執念が全ての行動原理。家族の中に潜む野心家で、目的のためなら手段を選ばない。","s":"スピード・キング（熱・速度）","q":"「勝つためなら何でもする。それが俺のやり方だ」","p":"Part 8"},"東方つるぎ":{"d":"無邪気だが善悪の区別が曖昧な9歳。東方家の長男に伝わる病を克服するために手段を選ばない冷酷さを持つ。ダジャレを言わずにいられない癖がある。","s":"ペーパー・ムーン・キング（折り紙操作・顔の識別不能）","q":"「禁じ手だけどやらなきゃ殺られていた…光で照らされたなら…あたしはその中へ進むッ！！」","p":"Part 8"},"虹村形兆":{"p":"Part 4","s":"バッド・カンパニー（ミニチュア軍隊）","d":"几帳面で弟思いの兄。父を死なせるためスタンド使いを増やした。","q":"「おまえは一枚のCDを聞き終わったらキチッとケースにしまってから次のCDを聞くだろう？誰だってそーする おれもそーする」"},"トニオ・トラサルディー":{"p":"Part 4","s":"パール・ジャム（料理に混入し体の不調を治す）","d":"温厚で誠実なイタリア人料理人。厨房に無断侵入すると豹変する。","q":"「料理人にとって他に何があるっていうのでショウ？ソレがワタシの生きガイでス ワタシの望ム全てデス」"},"ウェカピポ":{"p":"Part 7","s":"レッキング・ボール（衛星付き鉄球・左半身認識不能）","d":"元王族護衛官。生真面目で相手を敬う。信念は揺るがない。","q":"「オレの気分も結構…清らかだ」"},"スティーブン・スティール":{"p":"Part 7","s":"なし（SBRレース主催者）","d":"SBRレース主催者。威勢は良いが妻に泣きつく人情派。","q":"「真の'失敗'とはッ！開拓の心を忘れ！困難に挑戦する事に無縁のところにいる者たちの事をいうのだッ！」"},"ポコロコ":{"p":"Part 7","s":"なし（強運の持ち主）","d":"50億分の1のラッキーガイ。ポジティブで能天気なレース参加者。","q":"「オレは50億分の1のラッキー・ガイだッ！UH！OHHH！」"},"田最環":{"p":"Part 8","s":"ビタミンC（指紋で触れた生物を極限まで柔らかくする）","d":"ロカカカ密売グループのリーダー。冷静かつ狡猾な岩人間。","q":"「だが逆に言うと そういう生意気なことをするやつは絶対に探し出してやると わたしは誓った」"},"八木山夜露":{"p":"Part 8","s":"アイ・アム・ア・ロック（触れた相手に向かって周囲の物が集まる）","d":"岩人間の建築家。社会的名声を欲し東方家に潜入した。","q":"「オレはひとつの岩だ そしてひとつの島だ」"},"豆銑礼":{"p":"Part 8","s":"ドギー・スタイル（体をワイヤー状に分解）","d":"東方家専属の植物鑑定人。人間嫌いで気難しいが、信義を重んじる。口癖は「生存率は○％」。","q":"「約束というのは『神聖』だぞ 神聖さを軽くあつかうな」"},"虹村京":{"p":"Part 8","s":"ボーン・ディス・ウェイ（開く動作でバイクが出現・冷気攻撃）","d":"東方家の家政婦。正体は吉良吉影の妹。母ホリーを守るため東方家に潜入。","q":"「あなたはあなた…わかってるわ…この世の誰だってそう…あなたはあなた自身」"}};

const PC={"Part 1":{bg:"#1a2a3a",t:"#7ab4f0"},"Part 1 / 2":{bg:"#1a2a3a",t:"#7ab4f0"},"Part 1 / 3":{bg:"#2a2010",t:"#d4a060"},"Part 2":{bg:"#162010",t:"#7dd4a0"},"Part 2 / 3":{bg:"#162010",t:"#7dd4a0"},"Part 3":{bg:"#2a1010",t:"#e08080"},"Part 4":{bg:"#1e1530",t:"#b090e0"},"Part 5":{bg:"#241808",t:"#d4a060"},"Part 6":{bg:"#22101a",t:"#e090b0"},"Part 7":{bg:"#0e1e18",t:"#70c4a8"},"Part 8":{bg:"#181820",t:"#a0a8b8"}};
const NAMES=Object.keys(CHARS);

function loadUL(){try{const s=localStorage.getItem('jojo_ul4');if(s){const o=JSON.parse(s);return{easy:new Set(o.easy||[]),normal:new Set(o.normal||[]),hard:new Set(o.hard||[])};}}catch(e){}return{easy:new Set(),normal:new Set(),hard:new Set()};}
function saveUL(){try{localStorage.setItem('jojo_ul4',JSON.stringify({easy:[...UL.easy],normal:[...UL.normal],hard:[...UL.hard]}));}catch(e){}}
function isStar(n){return UL.easy.has(n)&&UL.normal.has(n)&&UL.hard.has(n);}

let UL=loadUL();
let diff='easy',lives=3,queue=[],current=null,choices=[],answered=false,score=0,zukanTab='star',zukanFrom='top';

function sh(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function iconEl(n,sz=44){
  const c=PC[CHARS[n].p]||{bg:"#1e1530",t:"#b090e0"};
  const star=isStar(n)?`<div style="position:absolute;top:-3px;right:-3px;font-size:11px;">⭐</div>`:'';
  return `<div style="position:relative;display:inline-flex;flex-shrink:0;"><div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${c.bg};color:${c.t};border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:${Math.round(sz*.3)}px;font-weight:700;">${n.slice(0,2)}</div>${star}</div>`;
}

function hintHTML(n){
  const c=CHARS[n];
  if(diff==='easy')return`<div class="hint-lbl">名言</div><div class="hint-text">${c.q}</div>`;
  if(diff==='normal')return`<div class="hint-lbl">スタンド</div><div class="hint-text">${c.s}</div>`;
  return`<div class="hint-lbl">性格</div><div class="hint-text">${c.d}</div>`;
}

function logo(){return`<div class="logo"><div style="font-size:12px;font-weight:500;color:var(--gold);letter-spacing:.12em;">ジョジョの奇妙な冒険</div><div style="font-size:20px;font-weight:700;color:var(--text);margin-top:6px;letter-spacing:.01em;white-space:nowrap;">キャラクタークイズ</div></div>`;}
function R(html){document.getElementById('app').innerHTML=logo()+html;}

function showTop(){
  const total=NAMES.length,e=UL.easy.size,m=UL.normal.size,h=UL.hard.size;
  const stars=NAMES.filter(n=>isStar(n)).length,pct=Math.round(stars/total*100);
  R(`
    <div class="stats-grid">
      <div class="stat" style="background:#0d2016;"><div class="stat-num" style="color:#7dd4a0;">${e}</div><div class="stat-lbl" style="color:#4a9e6a;">🟢 名言</div></div>
      <div class="stat" style="background:#0d1828;"><div class="stat-num" style="color:#7ab4f0;">${m}</div><div class="stat-lbl" style="color:#4a7ec0;">🔵 スタンド</div></div>
      <div class="stat" style="background:#200d0d;"><div class="stat-num" style="color:#e08080;">${h}</div><div class="stat-lbl" style="color:#c04040;">🔴 性格</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px;"><span>⭐ 完全解放 ${stars}/${total}</span><span>${pct}%</span></div>
    <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%;"></div></div>
    <button class="btn center gold" onclick="showDiff()">クイズに挑戦する</button>
    <button class="btn center" onclick="zukanFrom='top';showZukan('star')">図鑑を見る</button>
  `);}

function showDiff(){
  R(`
    <div style="font-size:15px;font-weight:500;color:var(--gold);margin-bottom:1.25rem;">難易度を選んでください</div>
    ${[
      ['easy','🟢','かんたん','名言からキャラを当てる','#0d2016','#4a9e6a','#7dd4a0','名言が図鑑に解放される'],
      ['normal','🔵','ふつう','スタンドからキャラを当てる','#0d1828','#4a7ec0','#7ab4f0','スタンドが図鑑に解放される'],
      ['hard','🔴','むずかしい','性格からキャラを当てる','#200d0d','#c04040','#e08080','性格が図鑑に解放される']
    ].map(([d,em,label,sub,bg,border,tc,eff])=>`
      <div style="border:1px solid ${border};border-radius:14px;padding:1.25rem;background:${bg};margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
          <div style="width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:20px;">${em}</div>
          <div><div style="font-weight:500;font-size:15px;color:${tc};">${label}</div><div style="font-size:12px;color:var(--text2);">${sub}</div></div>
        </div>
        <div style="font-size:12px;color:${tc};margin:6px 0 12px 54px;opacity:.8;">→ ${eff}</div>
        <button class="btn center" style="margin-bottom:0;border-color:${border};color:${tc};" onclick="startQuiz('${d}')">${label}で始める</button>
      </div>`).join('')}
    <div style="font-size:12px;color:var(--text2);text-align:center;margin:8px 0;">3つ全部解放すると ⭐ がつきます</div>
    <button class="btn center muted" onclick="showTop()">もどる</button>
  `);}

function startQuiz(d){
  diff=d;lives=3;score=0;
  const notYet=sh(NAMES.filter(n=>!UL[d].has(n)));
  const done=sh(NAMES.filter(n=>UL[d].has(n)));
  queue=[...notYet,...done];
  nextQ();
}

function nextQ(){
  if(!queue.length){showClear();return;}
  current=queue.shift();
  choices=sh([current,...sh(NAMES.filter(n=>n!==current)).slice(0,3)]);
  answered=false;
  renderQuiz();
}

function renderQuiz(){answered=false;
  const total=NAMES.length;
  const dl=diff==='easy'?'🟢 かんたん':diff==='normal'?'🔵 ふつう':'🔴 むずかしい';
  const hearts='❤️'.repeat(lives)+'🖤'.repeat(3-lives);
  R(`
    <div class="quiz-meta">
      <span style="font-size:12px;color:var(--text2);">${dl}</span>
      <span style="font-size:18px;">${hearts}</span>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px;">アンロック済み ${UL[diff].size}/${total} ・ 残り ${total-UL[diff].size}問</div>
    <div class="hint-wrap"><div style="font-size:12px;color:var(--text2);margin-bottom:10px;">このキャラは誰？</div>${hintHTML(current)}</div>
    ${choices.map((n,i)=>`<button class="btn" id="cb${i}" data-name="${n}" onclick="doAns(this.dataset.name)">${n}</button>`).join('')}
    <button class="btn center muted" onclick="showTop()">やめる</button>
  `);}

function doAns(name){
  if(answered)return;answered=true;
  const ok=name===current;
  choices.forEach((n,i)=>{const b=document.getElementById('cb'+i);if(!b)return;b.style.pointerEvents='none';if(n===current)b.className='btn correct';else if(n===name&&!ok)b.className='btn wrong';});
  if(ok){
    score++;
    const isNew=!UL[diff].has(current);
    const wasStar=isStar(current);
    UL[diff].add(current);saveUL();
    if(isNew){setTimeout(()=>showUnlock(current,!wasStar&&isStar(current)),600);return;}
  } else {
    lives--;
    if(lives<=0){setTimeout(()=>showGameOver(),700);return;}
  }
  setTimeout(()=>nextQ(),700);
}

function showUnlock(name,newStar){
  const total=NAMES.length;
  const info=CHARS[name],pc=PC[info.p]||{bg:"#1e1530",t:"#b090e0"};
  const dc=diff==='easy'?{bg:'#0d2016',b:'#4a9e6a',t:'#7dd4a0',s:'名言'}:diff==='normal'?{bg:'#0d1828',b:'#4a7ec0',t:'#7ab4f0',s:'スタンド'}:{bg:'#200d0d',b:'#c04040',t:'#e08080',s:'性格'};
  const val=diff==='easy'?info.q:diff==='normal'?info.s:info.d;
  R(`
    <div class="unlock-wrap" style="border:2px solid ${newStar?'#EF9F27':dc.b};background:linear-gradient(135deg,var(--dark2),${dc.bg});">
      <div style="font-size:12px;color:${newStar?'#d4a060':dc.t};margin-bottom:12px;letter-spacing:.08em;">${newStar?'⭐ 完全解放達成！':'図鑑に登録されました'}</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;text-align:left;">${iconEl(name,56)}<div><div style="font-size:20px;font-weight:500;">${name}${isStar(name)?' ⭐':''}</div><span class="part-badge" style="background:${pc.bg};color:${pc.t};margin-top:4px;display:inline-block;">${info.p}</span></div></div>
      <div style="font-size:11px;color:${dc.t};margin-bottom:6px;text-align:left;">解放された情報：${dc.s}</div>
      <div style="font-size:14px;color:${dc.t};padding:12px;background:rgba(0,0,0,.3);border-radius:10px;line-height:1.7;text-align:left;border-left:3px solid ${dc.b};">${val}</div>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--text2);margin-bottom:1rem;">${diff==='easy'?'🟢':diff==='normal'?'🔵':'🔴'} ${UL[diff].size}/${total} ・ ⭐ ${NAMES.filter(n=>isStar(n)).length}/${total}</div>
    <button class="btn center" onclick="nextQ()">次の問題へ</button>
    <button class="btn center muted" onclick="showTop()">トップへ戻る</button>
  `);}

function showGameOver(){
  const info=CHARS[current];
  R(`
    <div style="text-align:center;padding:1.75rem;border:1px solid var(--border);border-radius:16px;background:var(--dark2);margin-bottom:1.25rem;">
      <div style="font-size:24px;font-weight:700;color:var(--red);margin-bottom:8px;">ゲームオーバー</div>
      <div style="font-size:14px;color:var(--text2);">正解数: ${score}問</div>
    </div>
    <div style="border:1px solid var(--border2);border-radius:12px;padding:1rem;background:var(--dark2);margin-bottom:1rem;">
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">正解は…</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">${iconEl(current,48)}<div><div style="font-size:17px;font-weight:500;">${current}</div><div style="font-size:12px;color:var(--text2);">${info.p}</div></div></div>
      <div style="font-size:13px;color:var(--gold-l);border-left:2px solid var(--gold);padding-left:10px;line-height:1.7;">${info.q}</div>
    </div>
    <button class="btn center gold" onclick="showDiff()">もう一度挑戦</button>
    <button class="btn center muted" onclick="showTop()">トップへ戻る</button>
  `);}

function showClear(){
  const total=NAMES.length;
  R(`
    <div style="text-align:center;padding:2rem;border:2px solid var(--gold);border-radius:16px;background:linear-gradient(135deg,var(--dark2),rgba(201,168,76,.08));margin-bottom:1.25rem;">
      <div style="font-size:24px;font-weight:700;color:var(--gold);margin-bottom:8px;">全問クリア！</div>
      <div style="font-size:14px;color:var(--text2);">⭐ ${NAMES.filter(n=>isStar(n)).length}/${total} 完全解放</div>
    </div>
    <button class="btn center gold" onclick="showDiff()">もう一度挑戦</button>
    <button class="btn center" onclick="zukanFrom='top';showZukan('star')">図鑑を見る</button>
    <button class="btn center muted" onclick="showTop()">トップへ戻る</button>
  `);}

function showZukan(tab){
  zukanTab=tab||'star';
  const parts=[...new Set(NAMES.map(n=>CHARS[n].p))].sort();
  const total=NAMES.length,cS=NAMES.filter(n=>isStar(n)).length,cE=UL.easy.size,cN=UL.normal.size,cH=UL.hard.size;
  const isUL=n=>zukanTab==='star'?isStar(n):UL[zukanTab].has(n);

  let html=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <div style="font-size:15px;font-weight:500;color:var(--gold);">図鑑</div>
      <button class="back-btn" onclick="${zukanFrom==='top'?'showTop()':'showDiff()'}">← もどる</button>
    </div>
    <div class="tab-row">
      <div class="tab${zukanTab==='star'?' act-star':''}" onclick="showZukan('star')">⭐ 完全<br><span style="font-size:11px;">${cS}/${total}</span></div>
      <div class="tab${zukanTab==='easy'?' act-easy':''}" onclick="showZukan('easy')">🟢 名言<br><span style="font-size:11px;">${cE}/${total}</span></div>
      <div class="tab${zukanTab==='normal'?' act-normal':''}" onclick="showZukan('normal')">🔵 スタンド<br><span style="font-size:11px;">${cN}/${total}</span></div>
      <div class="tab${zukanTab==='hard'?' act-hard':''}" onclick="showZukan('hard')">🔴 性格<br><span style="font-size:11px;">${cH}/${total}</span></div>
    </div>`;

  if(zukanTab==='star'){
    const stars=NAMES.filter(n=>isStar(n));
    if(!stars.length){
      html+=`<div style="text-align:center;padding:3rem 1rem;color:var(--text2);"><div style="font-size:32px;margin-bottom:12px;">⭐</div><div style="font-size:14px;margin-bottom:8px;">完全解放したキャラがまだいません</div><div style="font-size:12px;">3つの難易度すべてクリアすると⭐がつきます</div></div>`;
    } else {
      html+=`<div style="font-size:12px;color:var(--text2);margin-bottom:12px;">3要素すべて解放済み — ${stars.length}キャラ</div><div style="display:flex;flex-wrap:wrap;gap:8px;">`;
      for(const n of stars){
        const c=PC[CHARS[n].p]||{bg:"#1e1530",t:"#b090e0"};
        html+=`<div class="z-icon" title="${n}" style="background:${c.bg};color:${c.t};" onclick="showDetail('${n.replace(/'/g,"\\'")}')">${n.slice(0,2)}<div style="position:absolute;top:-3px;right:-3px;font-size:10px;">⭐</div></div>`;
      }
      html+=`</div>`;
    }
  } else {
    for(const part of parts){
      const chars=NAMES.filter(n=>CHARS[n].p===part);
      const pc=PC[part]||{bg:"#1e1530",t:"#b090e0"};
      const cnt=chars.filter(n=>isUL(n)).length;
      html+=`<div style="margin-bottom:1.25rem;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><span class="part-badge" style="background:${pc.bg};color:${pc.t};">${part}</span><span style="font-size:12px;color:var(--text2);">${cnt}/${chars.length}</span></div><div style="display:flex;flex-wrap:wrap;gap:8px;">`;
      for(const n of chars){
        const c=PC[CHARS[n].p]||{bg:"#1e1530",t:"#b090e0"};
        if(isUL(n)){
          html+=`<div class="z-icon" title="${n}" style="background:${c.bg};color:${c.t};" onclick="showDetail('${n.replace(/'/g,"\\'")}')">${n.slice(0,2)}${isStar(n)?'<div style="position:absolute;top:-3px;right:-3px;font-size:10px;">⭐</div>':''}</div>`;
        } else {
          html+=`<div class="z-icon z-lock">?</div>`;
        }
      }
      html+=`</div></div>`;
    }
  }
  R(html);
}

function showDetail(name){
  const info=CHARS[name],pc=PC[info.p]||{bg:"#1e1530",t:"#b090e0"};
  const hasE=UL.easy.has(name),hasN=UL.normal.has(name),hasH=UL.hard.has(name);
  const row=(icon,key,val,unlocked,lockMsg)=>`
    <div class="info-row">
      <div class="info-key">${icon} ${key}</div>
      ${unlocked?`<div class="info-val">${val}</div>`:`<div class="info-lock">${lockMsg}</div>`}
    </div>`;
  R(`
    <button class="back-btn" onclick="showZukan('${zukanTab}')">← 図鑑に戻る</button>
    <div class="detail-wrap">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:1rem;">
        ${iconEl(name,60)}
        <div>
          <div style="font-size:20px;font-weight:500;">${name}${isStar(name)?' ⭐':''}</div>
          <span class="part-badge" style="background:${pc.bg};color:${pc.t};margin-top:6px;display:inline-block;">${info.p}</span>
        </div>
      </div>
      ${row('🟢','名言',info.q,hasE,'🟢 かんたんクリアで解放')}
      <div class="info-row">
        <div class="info-key">🔵 スタンド</div>
        ${hasN?`<div class="info-val" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;">${info.s}</div>`:`<div class="info-lock">🔵 ふつうクリアで解放</div>`}
      </div>
      ${row('🔴','性格',info.d,hasH,'🔴 むずかしいクリアで解放')}
    </div>
  `);}

showTop();
</script>
</body>
</html>
